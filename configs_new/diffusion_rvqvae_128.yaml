wandb_project: 'GestureLSM'
exp_name: 'diffusion_rvqvae_128'

wandb_entity: 'xxx'
wandb_key: "xxxxxxxx"
wandb_log_dir: './outputs/wandb'
output_dir: ./outputs/weights
log_period: 10
val_period: 20
gpus: [0]
seed: 42
ddp: false
debug: false

vqvae_upper_path: ./ckpt/net_300000_upper.pth
vqvae_hands_path: ./ckpt/net_300000_hands.pth
vqvae_lower_path: ./ckpt/net_300000_lower.pth



grad_ckpt: False # whether to use gradient checkpointing, for memory saving


pre_frames: 4
pose_length: 128
vqvae_squeeze_scale: 4
vqvae_latent_scale: 5
vae_length: 240
vae_test_len: 32
mean_pose_path: "./mean_std/rep15d_mean.npy"
std_pose_path: "./mean_std/rep15d_std.npy"

data:
  name_pyfile: "dataloaders.beat_sep_lower"
  class_name: "CustomDataset"
  train_bs: 128
  multi_length_training: [1.0]
  root_path: ./
  beat_align: True
  pose_rep: smplxflame_30
  
  pose_norm: True
  pose_fps: 30
  rot6d: True
  pose_dims: 825
  pose_length: 128
  stride: 20
  test_length: 128
  audio_sr: 16000
  audio_fps: 16000
  audio_norm: False
  
  data_path_1: ./datasets/hub/
  data_path: ./datasets/BEAT_SMPL/beat_v2.0.0/beat_english_v2.0.0/
  training_speakers: [2]
  additional_data: False
  cache_path: ./datasets/beat_cache/beat_smplx_en_emage_2_128/
  new_cache: False
  disable_filtering: False
  clean_first_seconds: 0
  clean_final_seconds: 0

  audio_rep: onset+amplitude
  word_rep: textgrid
  t_pre_encoder: fasttext
  facial_rep: smplxflame_30
  id_rep: onehot
  emo_rep: null
  sem_rep: null
  test_clip: False
  onset_rep: True

model:
  model_name: Diffusion
  g_name: GestureDiffusion
  do_classifier_free_guidance: False
  guidance_scale: 1.5
  n_steps: 20
  use_exp: False

  denoiser:
    target: models.denoiser.GestureDenoiser
    params:
      input_dim: 128
      latent_dim: 256
      ff_size: 1024
      num_layers: 8
      num_heads: 4
      dropout: 0.1
      activation: "gelu"
      n_seed: 8
      seq_len: 32
      flip_sin_to_cos: True
      freq_shift: 0.0
      cond_proj_dim: 256
      use_exp: ${model.use_exp}
  
  scheduler:
    target: diffusers.DDIMScheduler
    num_inference_steps: 20
    eta: 0.0
    params:
      num_train_timesteps: 1000
      # if using 'linear or 'scaled_linear', beta_start and beta_end matters, if cosine, beta_start and beta_end are ignored
      beta_start: 0.00085
      beta_end: 0.012
      # 'linear' or 'squaredcos_cap_v2' or 'scaled_linear'
      beta_schedule: 'squaredcos_cap_v2'
      prediction_type: 'sample'
      clip_sample: false
      # 'leading' or 'trailing' or 'linspace'
      timestep_spacing: 'leading'
      # below are for ddim
      set_alpha_to_one: True
      steps_offset: 0

  
  modality_encoder:
    target: models.layers.modality_encoder.ModalityEncoder
    params:
      data_path: ./datasets/BEAT_SMPL/beat_v2.0.0/beat_english_v2.0.0/
      t_fix_pre: False
      audio_dim: 256
      audio_in: 2
      raw_audio: False
      latent_dim: 256
      audio_fps: 30
      target_length: 128
      spatial_temporal: True
      use_exp: ${model.use_exp}

 
validation:
  val_loss_steps: 200
  validation_steps: 1000

control_eval:
  enabled: False
  name: ""
  joints:
    - [left_wrist]
    - [right_wrist]
    - [left_elbow]
    - [right_elbow]
    - [left_wrist, right_wrist, left_elbow, right_elbow]
  densities: [1, 5, 100]
  max_samples: 15
  space: absolute
  threshold_m: 0.05
  seed: 42
  iters_early: 5
  iters_late: 30
  late_start: 300
  post_iters: 0
  scale: 1.0
  weight: 1.0
  active_norm: sqrt
  chunk_delay: 0
  log_every: 0
  freeze_root: True

solver:
  opt: 'adam'
  epochs: 1000
  grad_norm: 1.0
  momentum: 0.8
  nesterov: True
  amsgrad: False
  
  # lr
  lr_base: 2e-4
  lr_policy: 'step'
  decay_rate: 0.1
  lr_warmup_steps: 50
  decay_epochs: 500
  warmup_epochs: 0
  warmup_lr: 5e-4
  lr_min: 1e-7
  weight_decay: 0.0
  opt_betas: [0.5, 0.999]